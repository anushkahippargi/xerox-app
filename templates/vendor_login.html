{% extends 'base.html' %}

{% block content %}
<div class="login-container glass-panel max-w-sm">
    <div class="login-header">
        <i data-lucide="lock" class="login-icon"></i>
        <h2>Vendor Login</h2>
        <p>Access your printing dashboard</p>
    </div>

    <form method="POST" action="/vendor" class="login-form">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter username" required>
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter password" required>
        </div>

        <button type="submit" class="submit-btn full-width">
            <span>Login</span>
            <i data-lucide="log-in"></i>
        </button>
    </form>
</div>
{% endblock %}
